[tox]
env_list = py310, py311, py312, py313, py314, lint, type, docs, build
skip_missing_interpreters = true

[testenv]
package = editable
extras = dev
commands = python -m pytest src/tests/unit

[testenv:lint]
base_python = python3.10
package = skip
deps = ruff
commands = ruff check src scripts

[testenv:type]
base_python = python3.10
package = skip
deps = pyright
commands = pyright

[testenv:docs]
base_python = python3.10
package = skip
deps =
    mkdocs
    mkdocs-gen-files
    pymdown-extensions
commands = mkdocs build --strict

[testenv:build]
base_python = python3.10
package = skip
deps =
    build
    twine
commands =
    python -m build
    python -m twine check dist/*
